<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>drift-meter — live gate board</title>
<style>
  :root { color-scheme: dark; }
  body { background: #111312; color: #d8d6cf; font: 13px/1.5 ui-monospace, "SF Mono", Menlo, monospace; margin: 0; padding: 28px 18px; }
  main { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 17px; letter-spacing: .06em; margin: 0 0 2px; }
  .sub { color: #8a877d; font-size: 11px; margin-bottom: 22px; }
  section { border: 1px solid #2a2d2a; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
  h2 { font-size: 10px; letter-spacing: .12em; color: #b8a14a; margin: 0 0 8px; }
  .t { display: flex; gap: 8px; }
  .t .mark { flex: none; }
  .pass .mark { color: #69b07a; } .fail .mark { color: #c75f4e; }
  .fail { color: #e0a79b; }
  .result { margin-top: 8px; font-weight: 700; }
  .banner { border-radius: 10px; padding: 10px 14px; font-weight: 800; letter-spacing: .08em; }
  .green { border: 1px solid #69b07a; color: #69b07a; }
  .red { border: 1px solid #c75f4e; color: #c75f4e; }
  .crash { color: #c75f4e; white-space: pre-wrap; }
</style>
<main>
  <h1>DRIFT-METER</h1>
  <div class="sub">the verifier, running live in your browser — nothing here is self-reported</div>
  <section><h2>VISIBLE SUITE — what the builder iterated against</h2><div id="visible">running…</div></section>
  <section><h2>HELD-OUT GATE — tests the builder never saw</h2><div id="heldout">running…</div></section>
  <div id="verdict"></div>
</main>
<script type="module">
const lines = [];
const orig = console.log.bind(console);
console.log = (...a) => { lines.push(a.join(" ")); orig(...a); };
globalThis.process ??= { exit: () => {} }; // node-shaped suites may call it; the page just keeps rendering

async function runSuite(file) {
  const before = lines.length;
  try { await import(file); } catch (e) { return { crash: String(e && e.message || e), tests: [], result: null }; }
  const out = lines.slice(before);
  const tests = out.filter(l => /^T [01] /.test(l)).map(l => ({ ok: l[2] === "1", name: l.slice(4) }));
  const m = out.map(l => l.match(/^RESULT (\d+) (\d+)$/)).find(Boolean);
  return { crash: null, tests, result: m ? { pass: +m[1], total: +m[2] } : null };
}

function render(el, r) {
  const host = document.getElementById(el);
  if (r.crash) { host.innerHTML = '<div class="crash">suite did not run: ' + r.crash + "</div>"; return; }
  host.innerHTML = r.tests.map(t =>
    '<div class="t ' + (t.ok ? "pass" : "fail") + '"><span class="mark">' + (t.ok ? "✓" : "✗") + "</span><span>" + t.name + "</span></div>"
  ).join("") + (r.result ? '<div class="result">' + r.result.pass + "/" + r.result.total + "</div>" : "");
}

const visible = await runSuite("./test.mjs");
const heldout = await runSuite("./.gate.test.mjs");
render("visible", visible);
render("heldout", heldout);
const green = [visible, heldout].every(r => r.result && r.result.pass === r.result.total && r.result.total > 0);
document.getElementById("verdict").innerHTML = green
  ? '<div class="banner green">TRUE GREEN — both suites clear</div>'
  : '<div class="banner red">NOT GREEN YET — the fleet is still earning this</div>';
</script>
